# Exception ModSecurity pour l'accès via IP LAN (cross-machine)
#
# Le déploiement expose l'app par IP locale (ex: https://192.168.1.133:8443)
# en plus de localhost. Deux règles OWASP CRS bloquent ça par défaut :
#   - 920350 : "Host header is a numeric IP address" — se déclenche sur
#     TOUTE requête dès que le Host header est une IP au lieu d'un domaine.
#   - 931100 : "Possible RFI Attack: URL Parameter using IP Address" — se
#     déclenche sur le paramètre callbackUrl de NextAuth (ex:
#     https://192.168.1.133:8443/login), qui contient légitimement une IP.
#
# Ensemble, ces deux règles dépassent le seuil ANOMALY_INBOUND=5 et bloquent
# le login/register en 403 dès qu'on accède par IP plutôt que par domaine.
#
# 920350 est désactivée globalement : l'app est censée être accessible par
# IP LAN, ce n'est pas un cas suspect ici.
# 931100 est désactivée uniquement sur /api/auth/ où callbackUrl est généré
# par NextAuth lui-même, pas par un attaquant.

SecRule REQUEST_HEADERS:Host "@rx ^[\d.:]+$" \
    "id:9002,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920350"

SecRule REQUEST_URI "@beginsWith /api/auth/" \
    "id:9003,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=931100"

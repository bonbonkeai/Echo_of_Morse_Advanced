# Docker Compose configuration for Transcendence project - DEVELOPMENT
# Architecture: Browser -> localhost:3000 -> Next.js container -> db:5432 -> PostgreSQL container

services:

  # PostgreSQL database container
  db:
    image: docker.io/library/postgres:15
    container_name: transcendence_db_dev
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - transcendence_network

  # Next.js application container - dev mode with hot reload
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: transcendence_web
    restart: always
    env_file:
      - .env.dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WS_INTERNAL_URL: http://ws:3001
    volumes:
      - .:/app                # Bind mount - code changes reflect immediately
      - /app/node_modules   # Keep container's node_modules
      - /app/srcs/generated   # keep container's generated
    depends_on:
      - db
    networks:
      - transcendence_network
    command: sh /app/docker/dev-entrypoint.sh


  ws:
    build: ./ws-server
    env_file:
      - .env.dev
    ports:
      - "3001:3001"
    networks:
    - transcendence_network

volumes:
  postgres_data_dev:

networks:
  transcendence_network:
    driver: bridge

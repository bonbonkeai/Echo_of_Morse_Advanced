# Exception ModSecurity pour le callback OAuth Google
#
# La règle 930120 (OS File Access / LFI) bloque le callback Google OAuth car
# le paramètre `scope` contient "userinfo.profile" — le WAF détecte ".profile"
# comme une tentative d'accès à un fichier système (~/.profile).
# C'est un faux positif : le scope Google OAuth est une URL légitime.
# Cette exception désactive la règle 930120 uniquement sur /api/auth/callback/google.

SecRule REQUEST_URI "@beginsWith /api/auth/callback/google" \
    "id:9010,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=930120"

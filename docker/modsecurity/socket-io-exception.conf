# Exception ModSecurity pour Socket.IO
#
# Socket.IO utilise Content-Type: text/plain pour ses requêtes POST de polling.
# La règle 920420 (OWASP CRS) bloque ce type car il n'est pas dans la liste
# des types autorisés par défaut. Cette exception désactive cette règle
# uniquement pour les requêtes vers /socket.io/, ce qui est sûr car :
#   - Elle ne s'applique qu'à ce chemin précis
#   - Le comportement text/plain de Socket.IO est connu et intentionnel
#   - Les autres règles de sécurité restent actives sur ce chemin

SecRule REQUEST_URI "@beginsWith /socket.io/" \
    "id:9001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=920420"
